<div class="example-tool-wrap">
  <div class="example-tool-header">
    <h3 data-i18n="custom.example-tool.title">Example Tool</h3>
    <p class="desc" data-i18n="custom.example-tool.desc">커스텀 플러그인 예시입니다. 이 템플릿을 참고하여 나만의 도구를 만들어보세요.</p>
  </div>

  <div class="example-tool-form">
    <div class="example-tool-field">
      <label data-i18n="custom.example-tool.note_title">제목</label>
      <input type="text" id="exampleNoteTitle" class="dev-input" placeholder="메모 제목">
    </div>
    <div class="example-tool-field">
      <label data-i18n="custom.example-tool.note_content">내용</label>
      <textarea id="exampleNoteContent" class="dev-input" rows="4" placeholder="메모 내용"></textarea>
    </div>
    <button type="button" id="exampleNoteSaveBtn" class="btn btn-primary" data-i18n="custom.example-tool.save">저장</button>
  </div>

  <div class="example-tool-list">
    <h4 data-i18n="custom.example-tool.list_title">저장된 메모</h4>
    <div id="exampleNoteList"></div>
  </div>
</div>
